name: Magazin Haberleri Botu

on:
  schedule:
    - cron: '*/15 * * * *'  # Her 15 dakikada bir otomatik çalışır
  workflow_dispatch:      # İstediğin zaman elle tetikleyebilmen için

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          pip install requests beautifulsoup4 google-genai

      - name: Git Kimlik Ayarlarını Yap
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Uzak Depodaki Son Değişiklikleri Güvenle Çek
        run: |
          git pull origin main --rebase || echo "Pull simdilik atlandi"

      - name: Botu Çevrimiçi Yap
        env:
          XF_API_KEY: ${{ secrets.XF_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python magazin_botu.py

      - name: Hafızayı Güncelle ve Güvenle Kaydet
        run: |
          if git status --porcelain | grep -q "used_titles.txt"; then
            git add used_titles.txt
            git commit -m "Magazin botu hafizasi guncellendi [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "Hafizada yeni bir degisiklik yok, push atlaniyor."
          fi
